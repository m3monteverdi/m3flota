<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3 Monteverdi Cubico</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>ðŸš›</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="hdr noprint">
  <img src="metro cubico.png" class="hdr-logo" style="width:42px;height:42px;object-fit:contain">
  <div>
    <div class="htit" style="font-size:22px;letter-spacing:.5px">WorkFlot</div>
    <div class="hsub" id="hdr-sub">M3 Monteverdi Cubico</div>
  </div>
  <div id="online-badge" class="online-badge on" style="margin-left:auto"><i class="ti ti-wifi"></i> En lÃ­nea</div>
</div>
<div class="tabs noprint">
   <button class="tab on" onclick="showTab('flota',this)"><i class="ti ti-truck"></i>Flota</button>
   <button class="tab" onclick="showTab('nuevo',this)"><i class="ti ti-circle-plus"></i>Reportar</button>
   <button class="tab" onclick="showTab('reparaciones',this)"><i class="ti ti-tool"></i>Reparar</button>
    <button class="tab" onclick="showTab('historial',this)"><i class="ti ti-history"></i>Historial</button>
   <button class="tab" onclick="askKey(this)"><i class="ti ti-settings"></i>Config</button>
 </div>

<div class="pane on" id="pane-flota">
  <div class="search-box">
    <i class="ti ti-search"></i>
    <input type="text" id="search-flota" placeholder="Buscar camion, chofer o modelo..." oninput="renderFlota()">
  </div>
  <div class="flota-grid" id="flota-grid"><div class="loader">Cargando...</div></div>
</div>

<div class="pane" id="pane-detalle">
  <button class="bo noprint" onclick="goToFlota()" style="margin-bottom:12px"><i class="ti ti-arrow-left"></i> Volver a flota</button>
  <div id="detalle-cont"><div class="loader">Cargando...</div></div>
</div>

<div class="pane" id="pane-nuevo">
  <div class="msg mok" id="ok-msg" style="display:none"><i class="ti ti-check"></i><span></span></div>
  <div class="msg merr" id="err-msg" style="display:none"><i class="ti ti-alert-circle"></i><span></span></div>
  <div id="qp-step1">
    
    <div style="display:flex;gap:8px">
      <input type="text" id="nc-cho" placeholder="Nombre del chofer" style="font-size:14px;padding:10px;border:1.5px solid #c5d0ef;border-radius:10px;flex:1">
      <button class="bo" onclick="addChofer()"><i class="ti ti-plus"></i> Agregar</button>
    </div>
  </div>
  <div class="card">
    <p style="font-size:14px;font-weight:800;margin-bottom:12px;color:var(--az);display:flex;align-items:center;gap:6px"><i class="ti ti-clipboard-data"></i> Datos de la flota</p>
    <p style="font-size:12px;color:#888;margin-bottom:10px">Toca un camion en la pestana Flota y despues Editar para modificar RTO, seguro, cubiertas y bateria.</p>
  </div>
</div>

<div id="qr-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center">
  <div class="card" style="max-width:380px;width:92%;text-align:center;position:relative">
    <button class="bo" onclick="closeQR()" style="position:absolute;top:10px;right:10px;padding:4px 8px;font-size:11px"><i class="ti ti-x"></i></button>
    <img src="metro cubico.png" style="width:80px;height:80px;object-fit:contain;margin-bottom:8px">
    <p style="font-size:16px;font-weight:800;margin-bottom:4px;color:var(--az)">Escanear para reportar</p>
    <p id="qr-cam-id" style="font-size:13px;color:#888;font-weight:600;margin-bottom:12px"></p>
    <div id="qr-canvas" style="display:flex;justify-content:center;margin-bottom:14px;background:#fff;padding:18px;border-radius:14px;border:2px solid var(--border)"></div>
    <p style="font-size:11px;color:#888;margin-bottom:12px">Imprime este codigo y pegalo en la unidad</p>
    <button class="bp" onclick="printQR()" style="max-width:240px;margin:0 auto"><i class="ti ti-printer"></i> Imprimir QR</button>
  </div>
</div>
<div id="qr-print-area" style="display:none"></div>

<div id="edit-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center">
  <div class="card" style="max-width:420px;width:92%;text-align:left;position:relative">
    <button class="bo" onclick="closeEdit()" style="position:absolute;top:10px;right:10px;padding:4px 8px;font-size:11px"><i class="ti ti-x"></i></button>
    <p style="font-size:16px;font-weight:800;margin-bottom:14px;color:var(--az)">Editar datos del camion</p>
    <div id="edit-form"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="bp" onclick="saveEditCamion()" style="flex:1"><i class="ti ti-device-floppy"></i> Guardar</button>
      <button class="bo" onclick="closeEdit()">Cancelar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/qrcode/build/qrcode.min.js" defer></script>
<script src="js/app.js?v=9" defer></script>
</body>
</html>
